<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Listly">
<meta name="theme-color" content="#f5f5f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141418" media="(prefers-color-scheme: dark)">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23111'/><text x='50' y='68' font-size='52' font-family='system-ui' font-weight='700' fill='%23f5f5f0' text-anchor='middle'>L</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23111'/><text x='90' y='122' font-size='96' font-family='system-ui' font-weight='700' fill='%23f5f5f0' text-anchor='middle'>L</text></svg>">
<link rel="manifest" href="data:application/json,{%22name%22:%22Listly%22,%22short_name%22:%22Listly%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f5f5f0%22,%22theme_color%22:%22%23111111%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23111'/><text x='256' y='345' font-size='280' font-family='system-ui' font-weight='700' fill='%23f5f5f0' text-anchor='middle'>L</text></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any maskable%22}]}">
<title>Listly</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f5f0;--white:#fff;--border:#e2e2dc;--text:#111;--muted:#aaa;--row-alt:#fafaf8;--accent:#111;--green:#2d7a4f;--red:#c0392b;--yellow:#b8860b;--safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px)}
body.dark{--bg:#141418;--white:#1e1e24;--border:#2e2e38;--text:#f0ede6;--muted:#555;--row-alt:#191920;--accent:#f0ede6;--green:#3a9e65;--red:#e05252;--yellow:#d4a017}
body{font-family:-apple-system,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;font-size:16px;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
.header{padding:calc(var(--safe-top)+12px) 16px 14px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.header-row{display:flex;align-items:center;justify-content:center;position:relative;min-height:36px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;text-align:center}
.header-sub{font-size:12px;color:var(--muted)}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:8px;color:var(--text);-webkit-user-select:none;line-height:1;position:absolute;right:12px;top:50%;transform:translateY(-50%)}.menu-btn:active{opacity:.5}
.back-btn{background:none;border:none;color:var(--accent);font-size:16px;font-weight:500;cursor:pointer;padding:8px 0;position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.hdr-title{font-size:17px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:0 60px}.hdr-title:active{opacity:.5}
.sort-inline{border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none;appearance:none;outline:none;padding:2px;text-align:center;width:36px}

/* Budget summary */
#budget-mini{display:none;padding:8px 0 0}#budget-mini.visible{display:block}
.bm-section{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin:4px 0 6px}
.bm-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:2px 0}
.bm-center{font-size:13px;font-weight:700;color:var(--text)}
.bm-edit{cursor:pointer;color:var(--muted);font-size:12px;margin-left:4px;vertical-align:middle}.bm-edit:active{opacity:.5}
.bm-stat{color:var(--muted);font-size:11px}.bm-stat b{font-weight:700;color:var(--text)}.bm-stat b.green{color:var(--green)}.bm-stat b.red{color:var(--red)}
.bm-label{color:var(--muted);font-weight:400}
.budget-bar-track{height:6px;background:var(--border);overflow:hidden;display:flex}
.bb-top{border-radius:999px 999px 0 0;margin-top:4px}
.bb-bottom{border-radius:0 0 999px 999px;margin-bottom:4px}
.bd-seg-actual{height:100%;width:0;flex-shrink:0;background:var(--green);transition:width .3s ease}
.bd-seg-forecast{height:100%;width:0;flex-shrink:0;background:var(--muted);transition:width .3s ease}
.bd-seg-actual.over{background:var(--red)}.bd-seg-forecast.over{background:var(--red)}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 8px}

/* Home cards - uniform layout */
.cards-wrap{padding:0 14px 10px}
.grand-total-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;margin:12px 14px 0;background:var(--white);border:1px solid var(--border);border-radius:12px;font-size:15px;font-weight:700}
.grand-total-bar .gt-label{color:var(--muted);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.5px}.grand-total-bar .gt-value{font-size:20px}.grand-total-bar .gt-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}
.list-card{background:var(--white);padding:14px 16px;display:flex;align-items:center;cursor:pointer;-webkit-user-select:none;transition:opacity .1s;border:1px solid var(--border);border-top:none}
.list-card:first-child{border-top:1px solid var(--border);border-radius:12px 12px 0 0;margin-top:10px}
.list-card:last-child{border-radius:0 0 12px 12px}
.list-card:only-child{border-radius:12px;border-top:1px solid var(--border)}
.list-card:active{opacity:.5}
.lc-info{flex:1;min-width:0}.lc-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lc-meta{font-size:12px;color:var(--muted);margin-top:2px}
.lc-budget-info{font-size:11px;margin-top:3px;display:flex;gap:5px;flex-wrap:wrap}
.lc-budget-tag{padding:2px 6px;border-radius:6px;font-weight:600;background:var(--bg)}.lc-budget-tag.green{color:var(--green)}.lc-budget-tag.red{color:var(--red)}.lc-budget-tag.neutral{color:var(--muted)}
.lc-right{display:flex;align-items:center;gap:6px;flex-shrink:0}.lc-total{font-size:17px;font-weight:700}.lc-arrow{color:var(--muted);font-size:18px}
.del-btn{background:none;border:none;color:var(--border);font-size:16px;cursor:pointer;padding:10px 8px;border-radius:50%;transition:color .12s;-webkit-tap-highlight-color:transparent}.del-btn:active{color:var(--red)}

/* Table */
table{width:100%;border-collapse:collapse;background:var(--white)}
.tbl-head td{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.tbl-total{}.tbl-total td{border-bottom:1px solid var(--green);background:rgba(45,122,79,0.05)}
body.dark .tbl-total td{background:rgba(58,158,101,0.08)}
.tbl-row td{border-bottom:1px solid var(--border);background:var(--white)}.tbl-row:last-child td{border-bottom:none}.tbl-row:nth-child(even) td{background:var(--row-alt)}
.new-row td{border-top:2px dashed var(--border);background:var(--bg)}
.col-name{width:auto}.col-qty{width:60px}.col-unit{width:68px}.col-amt{width:80px}.col-del{width:36px}
.cell-inp{display:block;width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:var(--text);outline:none;padding:12px 14px;white-space:normal;word-break:break-word}.cell-inp::placeholder{color:var(--border)}
.cell-name{cursor:text;min-height:1.2em;line-height:1.4}
.num-inp{display:block;width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;color:var(--text);font-weight:600;outline:none;padding:12px 8px;text-align:right;-webkit-appearance:none;appearance:none}.num-inp::placeholder{color:var(--border);font-weight:400}
.tbl-total .cell-inp{font-weight:700;font-size:16px;padding:12px 14px}.tbl-total .num-inp{font-weight:700;font-size:16px;padding:12px 8px;pointer-events:none;user-select:none}
.name-cell{display:flex;align-items:center}
.tbl-row td{vertical-align:middle}
.tbl-row.checked td{opacity:.45}
.tbl-row.checked .check{opacity:1}
.tbl-row{transition:transform .2s ease,opacity .2s ease}
.tbl-row.swiping td{position:relative}
.tbl-row.swipe-out{transform:translateX(-100%);opacity:0}
.check{flex-shrink:0;margin-left:10px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .12s;-webkit-user-select:none}.check.on{background:var(--green);border-color:var(--green)}
.check.bounce{animation:checkBounce .3s ease}
@keyframes checkBounce{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
.xbtn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;width:36px;height:44px;display:flex;align-items:center;justify-content:center;opacity:.6;transition:opacity .12s}.xbtn:active{opacity:1;color:var(--red)}
.search-bar{padding:0 16px;background:var(--bg);overflow:hidden;max-height:0;transition:max-height .2s ease;border-bottom:none}
.search-bar.open{max-height:50px;padding:8px 16px;border-bottom:1px solid var(--border)}
.search-inp{width:100%;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}.search-inp:focus{border-color:#888}.search-inp::placeholder{color:var(--muted)}

/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end}.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:28px 36px calc(var(--safe-bottom)+20px);width:100%;animation:up .22s ease;max-height:88vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px;text-align:center;padding:4px 0}
.seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.seg-btn{flex:1;padding:12px;font-size:15px;font-weight:500;cursor:pointer;border:none;background:var(--white);color:var(--muted);font-family:inherit}.seg-btn.on{background:var(--accent);color:var(--bg)}
.pane{display:none}.pane.on{display:block}
.inp{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:16px;color:var(--text);font-family:inherit;outline:none;margin-bottom:10px;-webkit-appearance:none}.inp:focus{border-color:#888}
.row2{display:flex;gap:8px;margin-bottom:10px}.row2 .inp{margin-bottom:0}
textarea.inp{min-height:120px;resize:none;font-family:'Menlo',monospace;font-size:14px;line-height:1.7}
.hint{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.btn-ok{width:100%;padding:15px;background:var(--accent);color:var(--bg);border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-no{width:100%;padding:14px;background:none;color:var(--muted);border:none;border-radius:12px;font-size:16px;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-danger{width:100%;padding:14px;background:none;color:var(--red);border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:2px}
.cur-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.cur-option{padding:14px 12px;border:2px solid var(--border);border-radius:12px;background:var(--bg);cursor:pointer;text-align:center;font-size:15px;font-weight:600;font-family:inherit;color:var(--text);transition:all .12s}.cur-option:active{transform:scale(.97)}.cur-option.selected{border-color:var(--green);background:rgba(45,122,79,0.08)}
.cur-option .cur-symbol{font-size:20px;display:block;margin-bottom:2px}.cur-option .cur-name{font-size:11px;color:var(--muted);font-weight:400}
.rates-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.rates-header{padding:14px 16px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.rates-header .rates-updated{font-size:11px;font-weight:400;text-transform:none;letter-spacing:0}
.rate-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}.rate-row:last-child{border-bottom:none}
.rate-row .rate-cur{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.rate-row .rate-cur .rate-code{font-size:12px;color:var(--muted);font-weight:400}
.rate-row .rate-val{font-size:15px;font-weight:600;color:var(--text)}
.rate-row.rate-home{background:rgba(45,122,79,0.06)}
.rate-row.rate-home .rate-val{color:var(--green)}
.rates-note{font-size:12px;color:var(--muted);text-align:center;padding:8px 0;line-height:1.5}
.rates-refresh{display:block;margin:12px auto;padding:10px 24px;border-radius:10px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}.rates-refresh:active{opacity:.5}
.rates-ref{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:8px}
.rates-ref-label{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.rates-ref-select{padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--white);color:var(--text);font-size:15px;font-weight:600;font-family:inherit;-webkit-appearance:none;appearance:none;outline:none;min-width:140px;text-align:center}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px;line-height:1.7}
.action-bar{padding:8px 16px calc(var(--safe-bottom)+8px);background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.nr-clear{color:var(--border)}
.below-add{display:flex;justify-content:flex-end;padding:8px 14px 0}
.below-add-btn{background:var(--accent);border:none;color:var(--bg);font-size:20px;font-weight:800;cursor:pointer;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.fab{position:fixed;top:auto;bottom:30px;right:20px;width:52px;height:52px;border-radius:16px;background:var(--accent);color:var(--bg);border:none;font-size:28px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:50;transition:transform .12s}.fab:active{transform:scale(.9)}
.home-footer{position:fixed;bottom:38px;left:20px;z-index:50}
.lc-edit{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:6px 8px;opacity:.65;vertical-align:middle;-webkit-tap-highlight-color:transparent}.lc-edit:active{opacity:1}
.csv-btn{background:var(--white);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;height:28px;padding:0 10px;border-radius:8px;font-family:inherit;letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;transition:all .12s}.csv-btn:active{opacity:.6}
.undo-toast{position:fixed;bottom:calc(var(--safe-bottom)+80px);left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:var(--bg);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:200;display:flex;align-items:center;gap:12px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:all .25s ease;pointer-events:none;white-space:nowrap}
.undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.undo-toast button{background:none;border:none;color:var(--green);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;padding:0;text-transform:uppercase}
@keyframes rowFlash{0%{background:var(--green)}100%{background:transparent}}.tbl-row.just-added td{animation:rowFlash .6s ease}

/* Modal list items (categories, budgets) */
.cat-list{margin-bottom:14px}
.cat-header-cell{padding:8px 14px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);cursor:pointer;-webkit-user-select:none}
.cat-header-cell:active{opacity:.6}
.cat-header-check{margin-left:6px;font-size:10px}
.cat-color-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.cat-header-name{vertical-align:middle}
.cat-header-total{float:right;font-weight:700;color:var(--muted);font-size:12px;text-transform:none;letter-spacing:0}
.cat-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.cat-item:last-child{border-bottom:none}
.cat-swatch{width:20px;height:20px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid var(--border);transition:transform .12s;display:inline-block}.cat-swatch:active{transform:scale(1.2)}
.color-picker-pop{position:absolute;bottom:100%;right:0;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px;display:flex;flex-wrap:wrap;gap:5px;width:115px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:10}
.cp-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;display:block}.cp-dot:hover{transform:scale(1.15)}.cp-dot:active{transform:scale(.9)}
.cat-item-name{font-size:15px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:14px}
.cat-item-actions{display:flex;gap:2px;flex-shrink:0}
.cat-item-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:6px 10px;color:var(--muted);border-radius:8px;transition:background .12s}.cat-item-btn:active{background:var(--bg)}

.nr-cat-wrap{display:flex;align-items:center;padding:6px 14px;background:var(--bg);border-top:1px solid var(--border)}
.nr-cat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-right:8px}
.nr-cat-select{border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--text);font-size:13px;font-family:inherit;padding:5px 8px;outline:none;-webkit-appearance:none;appearance:none;max-width:160px}
.dropdown{position:absolute;right:16px;top:100%;margin-top:4px;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:20;min-width:180px;overflow:hidden;display:none}
.dropdown.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);-webkit-user-select:none;font-family:inherit;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:active{background:var(--bg)}
.dropdown-item .di-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;color:var(--muted)}
.dropdown-item .di-toggle{margin-left:auto;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div id="home" class="screen active">
  <div class="header" style="position:relative"><div class="header-row"><h1>Listly</h1><button class="menu-btn" onclick="toggleMenu('home-menu')">⋯</button></div><div class="dropdown" id="home-menu"><button class="dropdown-item" onclick="closeMenus();showModal('m-newlist')"><span class="di-icon">+</span>New List</button><button class="dropdown-item" onclick="closeMenus();showModal('m-reorder-lists')"><span class="di-icon">↕</span>Reorder Lists</button><button class="dropdown-item" onclick="closeMenus();showModal('m-duplicate-list')"><span class="di-icon">⊕</span>Duplicate List</button><button class="dropdown-item" onclick="closeMenus();openCurrencyPicker('home')"><span class="di-icon">$</span>Home Currency<span class="di-toggle" id="currency-label">£</span></button><button class="dropdown-item" onclick="closeMenus();openRatesPage()"><span class="di-icon">⇄</span>Currency Rates</button><button class="dropdown-item" onclick="closeMenus();toggleDark()"><span class="di-icon">◑</span>Theme<span class="di-toggle" id="theme-label">Light</span></button><button class="dropdown-item" onclick="closeMenus();exportAllData()"><span class="di-icon">↓</span>Export Backup</button><button class="dropdown-item" onclick="closeMenus();document.getElementById('import-file').click()"><span class="di-icon">↑</span>Import Backup</button><button class="dropdown-item" onclick="closeMenus();showModal('m-restore-version')"><span class="di-icon">⟲</span>Restore Version</button></div></div>
  <div class="content" id="home-body"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="importAllData(this)">
</div>
<div id="ratesview" class="screen">

<script>
// ===== CONFIG =====
var BIN_ID='69a5d861d0ea881f40e82728';
var API_KEY='$2a$10$3rv/04v7DwuEEI.B7DaFVuK4Ixkmqfz4QL5hked90.jWDKtg61rh.';
var BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

// ===== STATE =====
var D={lists:[]},CID=null,qtyMode=false,budgetOn=false,checkedBottom=true,currentSort='none';
var saveTimer=null,undoStack=[],undoTimer=null,lastAddedId=null;
var CURRENCIES=['£','$','€','¥','EGP','SAR','AED','KWD'];
var HOME_CURRENCY=localStorage.getItem('homeCurrency')||'£';
// Approximate fallback rates to GBP (used when offline)
var FALLBACK_RATES={'GBP':1,'USD':1.27,'EUR':1.17,'JPY':189.5,'EGP':63.2,'SAR':4.76,'AED':4.66,'KWD':0.39};
var RATES={};
var CUR_TO_CODE={'£':'GBP','$':'USD','€':'EUR','¥':'JPY','EGP':'EGP','SAR':'SAR','AED':'AED','KWD':'KWD'};

function loadRates(){
  var cached=localStorage.getItem('fxRates');
  var cachedTime=parseInt(localStorage.getItem('fxRatesTime'))||0;
  var oneDay=86400000;
  if(cached&&(Date.now()-cachedTime<oneDay)){try{RATES=JSON.parse(cached);return;}catch(e){}}
  // Fallback immediately so app works while fetching
  RATES=FALLBACK_RATES;
  fetch('https://api.exchangerate-api.com/v4/latest/GBP')
    .then(function(r){return r.json();})
    .then(function(j){
      if(j&&j.rates){RATES=j.rates;localStorage.setItem('fxRates',JSON.stringify(RATES));localStorage.setItem('fxRatesTime',String(Date.now()));renderHome();}
    }).catch(function(){});
}
function convertToHome(amount,fromCur){
  if(fromCur===HOME_CURRENCY)return amount;
  var fromCode=CUR_TO_CODE[fromCur]||'GBP';
  var toCode=CUR_TO_CODE[HOME_CURRENCY]||'GBP';
  var fromRate=RATES[fromCode]||1;
  var toRate=RATES[toCode]||1;
  if(!fromRate||!toRate)return amount;
  return amount/fromRate*toRate;
}

// ===== UTILITY =====
function setSyncStatus(s){var e=document.getElementById('sync-status');if(!e)return;if(s==='saving'){e.textContent='↑ Saving…';e.style.color='var(--muted)';}if(s==='saved'){e.textContent='✓ Saved';e.style.color='var(--green)';}if(s==='error'){e.textContent='⚠ Offline';e.style.color='#e05252';}}
function save(){
  localStorage.setItem('ls5-backup',JSON.stringify(D));
  // Auto-backup versioning: keep last 5 snapshots
  try{
    var backups=JSON.parse(localStorage.getItem('ls5-versions')||'[]');
    var now=Date.now(),last=backups.length?backups[backups.length-1].t:0;
    if(now-last>300000){// snapshot every 5 min max
      backups.push({t:now,d:JSON.stringify(D)});
      if(backups.length>5)backups.shift();
      localStorage.setItem('ls5-versions',JSON.stringify(backups));
    }
  }catch(e){}
  clearTimeout(saveTimer);setSyncStatus('saving');saveTimer=setTimeout(function(){fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(D)}).then(function(r){if(!r.ok)throw new Error();setSyncStatus('saved');}).catch(function(){setSyncStatus('error');});},800);
}
function exportAllData(){
  var payload={version:1,exported:new Date().toISOString(),homeCurrency:HOME_CURRENCY,dark:localStorage.getItem('dark'),data:D};
  var json=JSON.stringify(payload,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='listly-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importAllData(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var payload=JSON.parse(e.target.result);
      var imported=payload.data||payload;
      if(!imported.lists||!Array.isArray(imported.lists)){alert('Invalid backup file.');return;}
      if(!confirm('Replace all data with backup? ('+imported.lists.length+' lists). Current data will be lost.'))return;
      D=imported;
      if(payload.homeCurrency){HOME_CURRENCY=payload.homeCurrency;localStorage.setItem('homeCurrency',HOME_CURRENCY);}
      if(payload.dark)localStorage.setItem('dark',payload.dark);
      save();renderHome();
    }catch(err){alert('Could not read backup file.');}
  };
  reader.readAsText(file);
  input.value='';
}
function restoreVersion(idx){
  try{
    var backups=JSON.parse(localStorage.getItem('ls5-versions')||'[]');
    if(!backups[idx])return;
    if(!confirm('Restore to this version? Current data will be replaced.'))return;
    D=JSON.parse(backups[idx].d);
    save();renderHome();closeModals();
  }catch(e){alert('Could not restore version.');}
}
function loadData(){setSyncStatus('saving');document.getElementById('home-body').innerHTML='<div class="empty">Loading…</div>';fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}}).then(function(r){return r.json();}).then(function(j){D=j.record||{lists:[]};migrateData();setSyncStatus('saved');renderHome();}).catch(function(){var b=localStorage.getItem('ls5-backup');if(b)D=JSON.parse(b);migrateData();setSyncStatus('error');renderHome();});}
function migrateData(){D.lists.forEach(function(l){if(!l.budgets){l.budgets=[];if(l.budget&&l.budget>0)l.budgets.push({id:uid(),name:'Budget',amount:l.budget});}});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sanitizeAmt(v){var n=parseFloat(v)||0;return n<0?0:n;}
function GL(){return D.lists.find(function(l){return l.id===CID;});}
function listCur(l){return l&&l.currency?l.currency:'£';}
function fmt(n,cur){var c=cur||'£';var s=(Math.round(n*100)/100).toFixed(2);if(s.endsWith('.00'))s=s.slice(0,-3);return c+s;}

// Dark mode
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('dark',document.body.classList.contains('dark')?'1':'0');updateThemeLabels();}
function updateThemeLabels(){var isDark=document.body.classList.contains('dark');var t1=document.getElementById('theme-label');if(t1)t1.textContent=isDark?'Dark':'Light';var t2=document.getElementById('theme-label-lv');if(t2)t2.textContent=isDark?'Dark':'Light';}
if(localStorage.getItem('dark')==='1'){document.body.classList.add('dark');}

var CUR_LABELS={'£':'GBP','$':'USD','€':'EUR','¥':'JPY','EGP':'EGP','SAR':'SAR','AED':'AED','KWD':'KWD'};
var curPickerMode='';
function openCurrencyPicker(mode){
  curPickerMode=mode;
  var current=mode==='home'?HOME_CURRENCY:listCur(GL());
  document.getElementById('cur-title').textContent=mode==='home'?'Home Currency':'List Currency';
  var grid=document.getElementById('cur-grid');
  grid.innerHTML=CURRENCIES.map(function(c){
    return '<button class="cur-option'+(c===current?' selected':'')+'" onclick="pickCurrency(\''+c+'\')"><span class="cur-symbol">'+c+'</span><span class="cur-name">'+CUR_LABELS[c]+'</span></button>';
  }).join('');
  showModal('m-currency');
}
function pickCurrency(c){
  if(curPickerMode==='home'){
    HOME_CURRENCY=c;localStorage.setItem('homeCurrency',HOME_CURRENCY);
    var cl=document.getElementById('currency-label');if(cl)cl.textContent=HOME_CURRENCY;
    closeModals();renderHome();
  }else{
    var l=GL();if(l){l.currency=c;save();}
    closeModals();renderList();renderBudgetSummary();
  }
}

// Rates page
function openRatesPage(){
  document.getElementById('home').classList.remove('active');
  document.getElementById('ratesview').classList.add('active');
  var fab=document.getElementById('home-fab');if(fab)fab.style.display='none';
  var hf=document.getElementById('home-footer');if(hf)hf.style.display='none';
  ratesRefCur=HOME_CURRENCY;
  renderRatesPage();
}
function closeRatesPage(){
  document.getElementById('ratesview').classList.remove('active');
  document.getElementById('home').classList.add('active');
  var fab=document.getElementById('home-fab');if(fab)fab.style.display='flex';
  var hf=document.getElementById('home-footer');if(hf)hf.style.display='block';
}
var ratesRefCur=null;
function relativeTime(ts){
  if(!ts)return 'Never';
  var diff=Date.now()-ts,s=Math.floor(diff/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);
  if(s<60)return 'Just now';if(m<60)return m+' min ago';if(h<24)return h+'h ago';if(d===1)return 'Yesterday';return d+' days ago';
}
function renderRatesPage(){
  var body=document.getElementById('rates-body');
  var refCur=ratesRefCur||HOME_CURRENCY;
  var cachedTime=parseInt(localStorage.getItem('fxRatesTime'))||0;
  var isLive=!!cachedTime;
  var updatedStr=isLive?relativeTime(cachedTime):'Fallback rates';

  // Reference currency selector
  var h='<div class="rates-ref"><span class="rates-ref-label">Base currency</span><select class="rates-ref-select" onchange="ratesRefCur=this.value;renderRatesPage()">';
  CURRENCIES.forEach(function(c){
    h+='<option value="'+c+'"'+(c===refCur?' selected':'')+'>'+c+' — '+CUR_LABELS[c]+'</option>';
  });
  h+='</select></div>';

  h+='<div class="rates-card"><div class="rates-header"><span>1 '+refCur+' ('+CUR_LABELS[refCur]+') =</span><span class="rates-updated">'+updatedStr+'</span></div>';
  var refCode=CUR_TO_CODE[refCur]||'GBP';
  var refRate=RATES[refCode]||1;
  CURRENCIES.forEach(function(c){
    if(c===refCur)return;
    var code=CUR_TO_CODE[c]||'GBP';
    var rate=RATES[code]||1;
    var converted=rate/refRate;
    h+='<div class="rate-row"><span class="rate-cur">'+c+' <span class="rate-code">'+CUR_LABELS[c]+'</span></span><span class="rate-val">'+converted.toFixed(c==='¥'||c==='EGP'?2:4)+'</span></div>';
  });
  h+='</div>';

  // Show which lists use which currency
  var listsByCur={};
  D.lists.forEach(function(l){var c=listCur(l);if(!listsByCur[c])listsByCur[c]=[];listsByCur[c].push(l.name);});
  var curKeys=Object.keys(listsByCur);
  if(curKeys.length){
    h+='<div class="rates-card"><div class="rates-header"><span>Lists by Currency</span></div>';
    curKeys.forEach(function(c){
      h+='<div class="rate-row"><span class="rate-cur">'+c+' <span class="rate-code">'+CUR_LABELS[c]+'</span></span><span class="rate-val" style="font-size:13px;font-weight:400;max-width:60%;text-align:right">'+listsByCur[c].map(function(n){return esc(n);}).join(', ')+'</span></div>';
    });
    h+='</div>';
  }

  h+='<button class="rates-refresh" onclick="refreshRates()">↻ Refresh Rates</button>';
  h+='<div class="rates-note">Rates from ExchangeRate-API (daily updates)<br>Used for Grand Total conversion only</div>';
  body.innerHTML=h;
}
function refreshRates(){
  var btn=document.querySelector('.rates-refresh');
  if(btn){btn.textContent='Refreshing…';btn.disabled=true;}
  fetch('https://api.exchangerate-api.com/v4/latest/GBP')
    .then(function(r){return r.json();})
    .then(function(j){
      if(j&&j.rates){RATES=j.rates;localStorage.setItem('fxRates',JSON.stringify(RATES));localStorage.setItem('fxRatesTime',String(Date.now()));}
      renderRatesPage();renderHome();
    }).catch(function(){if(btn){btn.textContent='↻ Refresh Failed';btn.disabled=false;}});
}
if(localStorage.getItem('dark')==='1'){document.body.classList.add('dark');}

// Menu system
function toggleMenu(id){var m=document.getElementById(id);var isOpen=m.classList.contains('open');closeMenus();if(!isOpen){m.classList.add('open');updateThemeLabels();updateBudgetLabel();var cl=document.getElementById('currency-label');if(cl)cl.textContent=HOME_CURRENCY;var lcl=document.getElementById('list-currency-label');if(lcl){var l=GL();lcl.textContent=listCur(l);}var ql=document.getElementById('qty-toggle-label');if(ql)ql.textContent=qtyMode?'On':'Off';setTimeout(function(){document.addEventListener('click',closeMenusOnClick,{once:true});},0);}}
function closeMenus(){document.querySelectorAll('.dropdown.open').forEach(function(d){d.classList.remove('open');});}
function closeMenusOnClick(e){if(!e.target.closest('.dropdown'))closeMenus();}
function updateBudgetLabel(){var bl=document.getElementById('budget-toggle-label');if(bl)bl.textContent=budgetOn?'On':'Off';}

// Undo
function pushUndo(msg,fn){undoStack=[{msg:msg,fn:fn}];var t=document.getElementById('undo-toast');document.getElementById('undo-msg').textContent=msg;t.classList.add('show');clearTimeout(undoTimer);undoTimer=setTimeout(function(){t.classList.remove('show');undoStack=[];},4000);}
function doUndo(){if(!undoStack.length)return;undoStack.pop().fn();document.getElementById('undo-toast').classList.remove('show');clearTimeout(undoTimer);}

// Budget helpers
function getTotalBudget(l){return(l.budgets||[]).reduce(function(s,b){return s+(b.amount||0);},0);}
function getActualSpend(l){return Math.round(l.items.slice(1).filter(function(i){return i.done;}).reduce(function(s,i){return s+(i.amt||0);},0)*100)/100;}
function getForecast(l){return l.items.length?(l.items[0].amt||0):0;}

// Home
function renderHome(){
  var gt=0;var curSet={};D.lists.forEach(function(l){
    var listTotal=l.items.length?(l.items[0].amt||0):0;
    var c=listCur(l);curSet[c]=true;
    gt+=convertToHome(listTotal,c);
  });
  var isMixed=Object.keys(curSet).length>1;
  var b=document.getElementById('home-body');
  var count=D.lists.length+' list'+(D.lists.length!==1?'s':'');
  if(!D.lists.length){b.innerHTML='<div class="empty">No lists yet.<br>Tap + to create one.</div>';return;}
  var gtDisplay=(isMixed?'≈ ':'')+fmt(Math.round(gt*100)/100,HOME_CURRENCY);
  var h='<div class="grand-total-bar"><div><span class="gt-label">Grand Total</span><div class="gt-sub">'+count+(isMixed?' · converted':'')+'</div></div><span class="gt-value">'+gtDisplay+'</span></div>';
  h+='<div class="cards-wrap">';
  h+=D.lists.map(function(l,idx){
    var cur=listCur(l);
    var total=l.items.length?(l.items[0].amt||0):0;
    var itemCount=l.items.length-1;
    var checkedCount=l.items.slice(1).filter(function(i){return i.done;}).length;
    var metaText=itemCount===0?'No items':checkedCount+'/'+itemCount+' checked';
    var bh='';
    if(l.budgetOn&&(l.budgets||[]).length){
      var tb=getTotalBudget(l),fc=l.items.length?(l.items[0].amt||0):0;
      var rem=tb-fc,over=rem<0;
      bh='<div class="lc-budget-info"><span class="lc-budget-tag neutral">Budget: '+fmt(tb,cur)+'</span><span class="lc-budget-tag '+(over?'red':'green')+'">'+(over?fmt(Math.abs(rem),cur)+' over':fmt(rem,cur)+' left')+'</span></div>';
    }
    return '<div class="list-card" onclick="openList(\''+l.id+'\')"><div class="lc-info"><div class="lc-name">'+esc(l.name)+' <button class="lc-edit" onclick="event.stopPropagation();renameListFromHome(\''+l.id+'\')" title="Rename">✎</button></div><div class="lc-meta">'+metaText+'</div>'+bh+'</div><div class="lc-right"><span class="lc-total">'+fmt(total,cur)+'</span><span class="lc-arrow">›</span><button class="del-btn" onclick="event.stopPropagation();delList(\''+l.id+'\')">✕</button></div></div>';
  }).join('');
  h+='</div>';
  b.innerHTML=h;
}

function doSaveEditItem(){
  var l=GL();if(!l)return;
  var id=document.getElementById('ei-id').value;
  var item=l.items.find(function(x){return x.id===id;});if(!item)return;
  item.name=document.getElementById('ei-name').value.trim()||item.name;
  item.amt=sanitizeAmt(document.getElementById('ei-amt').value);
  item.cat=document.getElementById('ei-cat').value;
  if(qtyMode){
    item.qty=sanitizeAmt(document.getElementById('ei-qty').value);
    item.unit=sanitizeAmt(document.getElementById('ei-unit').value);
    if(item.qty&&item.unit)item.amt=+(item.qty*item.unit).toFixed(2);
  }
  recalcTotal();save();closeModals();renderList();
}
function updateAmt(id,val){var l=GL(),i=l.items.find(function(x){return x.id===id;});if(i){i.amt=sanitizeAmt(val);recalcTotal();save();var pn=document.querySelector('.tbl-total .num-inp');if(pn)pn.value=l.items[0].amt;}}
function updateQty(id,val){var l=GL(),i=l.items.find(function(x){return x.id===id;});if(!i)return;i.qty=parseFloat(val)||0;if(i.unit)i.amt=+(i.qty*i.unit).toFixed(2);recalcTotal();save();var row=document.querySelector('tr[data-id="'+id+'"]');if(row){var a=row.querySelector('.col-amt .num-inp');if(a)a.value=i.amt;var pn=document.querySelector('.tbl-total .num-inp');if(pn)pn.value=l.items[0].amt;}}
function updateUnit(id,val){var l=GL(),i=l.items.find(function(x){return x.id===id;});if(!i)return;i.unit=parseFloat(val)||0;if(i.qty)i.amt=+(i.qty*i.unit).toFixed(2);recalcTotal();save();var row=document.querySelector('tr[data-id="'+id+'"]');if(row){var a=row.querySelector('.col-amt .num-inp');if(a)a.value=i.amt;var pn=document.querySelector('.tbl-total .num-inp');if(pn)pn.value=l.items[0].amt;}}
function delItem(id){var l=GL();var idx=l.items.findIndex(function(i){return i.id===id;});if(idx<1)return;var removed=l.items.splice(idx,1)[0];recalcTotal();save();renderList();pushUndo('"'+removed.name+'" deleted',function(){l.items.splice(idx,0,removed);recalcTotal();save();renderList();});}

// Modals
function showModal(id){closeModals();document.getElementById(id).classList.add('open');if(id==='m-additem'){var cats=(GL()||{categories:[]}).categories||[];var opts='<option value="">No category</option>'+cats.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('');document.getElementById('mi-cat').innerHTML=opts;document.getElementById('pi-cat').innerHTML=opts;document.getElementById('pi-text').value='';switchSeg('manual');}if(id==='m-manage-cats')renderCatList();if(id==='m-manage-budgets'){renderBudgetList();var _bl=GL();var _bc=listCur(_bl);document.getElementById('nb-amt').placeholder=_bc+' amount';}if(id==='m-reorder-lists')renderReorderLists();if(id==='m-duplicate-list')renderDuplicateList();if(id==='m-restore-version')renderRestoreVersions();setTimeout(function(){var f=document.querySelector('#'+id+' .inp');if(f)f.focus();},300);}
function closeModals(){document.querySelectorAll('.overlay').forEach(function(o){o.classList.remove('open');});}
function bgClose(e,el){if(e.target===el)closeModals();}
function switchSeg(s){document.getElementById('pane-manual').classList.toggle('on',s==='manual');document.getElementById('pane-paste').classList.toggle('on',s==='paste');document.getElementById('seg-manual').classList.toggle('on',s==='manual');document.getElementById('seg-paste').classList.toggle('on',s==='paste');}

// Categories
var CAT_COLORS=['#2d7a4f','#c0392b','#2980b9','#e67e22','#8e44ad','#16a085','#d4a017','#e74c3c','#3498db','#1abc9c'];
function renderCatList(){var l=GL();if(!l)return;var cats=l.categories||[],cc=l.catColors||{};var body=document.getElementById('cat-list-body');if(!cats.length){body.innerHTML='<div style="padding:10px 0;color:var(--muted);font-size:14px">No categories yet.</div>';return;}body.innerHTML=cats.map(function(c,idx){var col=cc[c]||'#999';var upBtn=idx>0?'<button class="cat-item-btn" onclick="moveCat('+idx+',-1)" title="Move up">↑</button>':'';var dnBtn=idx<cats.length-1?'<button class="cat-item-btn" onclick="moveCat('+idx+',1)" title="Move down">↓</button>':'';return '<div class="cat-item"><span class="cat-item-name">'+esc(c)+'</span><div class="cat-item-actions">'+upBtn+dnBtn+'<span class="cat-swatch" style="background:'+col+'" onclick="openColorPicker(this,\''+esc(c)+'\')"></span><button class="cat-item-btn" onclick="startRenameCat(\''+esc(c)+'\')" title="Rename">✎</button><button class="cat-item-btn" onclick="deleteCat(\''+esc(c)+'\')" style="color:var(--red)">✕</button></div></div>';}).join('');}
function moveCat(idx,dir){var l=GL();if(!l)return;var cats=l.categories;var ni=idx+dir;if(ni<0||ni>=cats.length)return;var tmp=cats[idx];cats[idx]=cats[ni];cats[ni]=tmp;save();renderCatList();renderList();}
function openColorPicker(el,cat){
  var existing=document.querySelector('.color-picker-pop');if(existing)existing.remove();
  var pop=document.createElement('div');pop.className='color-picker-pop';
  CAT_COLORS.forEach(function(c){var dot=document.createElement('span');dot.className='cp-dot';dot.style.background=c;dot.onclick=function(e){e.stopPropagation();setCatColor(cat,c);pop.remove();document.removeEventListener('click',closer);};pop.appendChild(dot);});
  el.parentElement.style.position='relative';el.parentElement.appendChild(pop);
  function closer(e){if(!pop.contains(e.target)){pop.remove();document.removeEventListener('click',closer);}}
  setTimeout(function(){document.addEventListener('click',closer);},0);
}
function setCatColor(cat,color){var l=GL();if(!l)return;if(!l.catColors)l.catColors={};l.catColors[cat]=color;save();renderCatList();renderList();}
function doCreateList(){var n=document.getElementById('nl-name').value.trim();if(!n)return;var totalRow={id:uid(),name:'Total',amt:0,qty:0,unit:0,cat:'',done:false};D.lists.push({id:uid(),name:n,categories:[],items:[totalRow],budgets:[],budgetOn:false,currency:HOME_CURRENCY});save();closeModals();renderHome();document.getElementById('nl-name').value='';}
function doAddCat(){var n=document.getElementById('ac-name').value.trim();if(!n)return;var l=GL();if(!l.categories)l.categories=[];if(!l.categories.includes(n))l.categories.push(n);save();renderCatList();renderList();document.getElementById('ac-name').value='';}
function startRenameCat(oldName){closeModals();document.getElementById('rc-old').value=oldName;document.getElementById('rc-name').value=oldName;showModal('m-rename-cat');}
function doRenameCat(){var oldName=document.getElementById('rc-old').value,newName=document.getElementById('rc-name').value.trim();if(!newName)return;var l=GL();if(!l)return;var idx=(l.categories||[]).indexOf(oldName);if(idx!==-1)l.categories[idx]=newName;l.items.forEach(function(i){if(i.cat===oldName)i.cat=newName;});if(l.catColors&&l.catColors[oldName]){l.catColors[newName]=l.catColors[oldName];delete l.catColors[oldName];}save();closeModals();setTimeout(function(){showModal('m-manage-cats');},250);}
function deleteCat(catName){var l=GL();if(!l)return;l.categories=(l.categories||[]).filter(function(c){return c!==catName;});l.items.forEach(function(i){if(i.cat===catName)i.cat='';});save();renderCatList();renderList();}
function doAddManual(){var n=document.getElementById('mi-name').value.trim();if(!n)return;var a=sanitizeAmt(document.getElementById('mi-amt').value),c=document.getElementById('mi-cat').value;var newId=uid();lastAddedId=newId;GL().items.push({id:newId,name:n,amt:a,qty:0,unit:0,cat:c,done:false});recalcTotal();save();closeModals();renderList();document.getElementById('mi-name').value='';document.getElementById('mi-amt').value='';}
function doAddPaste(){var raw=document.getElementById('pi-text').value.trim();if(!raw)return;var cat=document.getElementById('pi-cat').value,l=GL();raw.split(/\r?\n/).forEach(function(line){var parts=line.trim().split(/\t|,|  +/);if(!parts[0].trim())return;var name=parts[0].trim(),amt=parts.length>=2?(parseFloat(parts[parts.length-1].replace(/[£$€¥,\s]|EGP|SAR|AED|KWD/gi,''))||0):0;l.items.push({id:uid(),name:name,amt:amt,qty:0,unit:0,cat:cat,done:false});});recalcTotal();save();closeModals();renderList();}
function exportCSV(){var l=GL();if(!l)return;var rows=[['Name','Amount','Qty','Unit Price','Category','Done']];l.items.slice(1).forEach(function(i){rows.push(['"'+((i.name||'').replace(/"/g,'""'))+'"',i.amt||0,i.qty||'',i.unit||'','"'+((i.cat||'').replace(/"/g,'""'))+'"',i.done?'Yes':'No']);});var tot=l.items[0];rows.push(['"'+((tot?(tot.name||'Total'):'Total').replace(/"/g,'""'))+'"',tot?(tot.amt||0):0,'','','','']);var csv=rows.map(function(r){return r.join(',');}).join('\r\n');var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=((l.name||'list').replace(/[^a-z0-9]/gi,'_'))+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}

document.getElementById('nl-name').addEventListener('keydown',function(e){if(e.key==='Enter')doCreateList();});
document.getElementById('ac-name').addEventListener('keydown',function(e){if(e.key==='Enter')doAddCat();});
document.getElementById('rl-name').addEventListener('keydown',function(e){if(e.key==='Enter')doRenameList();});
document.getElementById('rc-name').addEventListener('keydown',function(e){if(e.key==='Enter')doRenameCat();});
document.getElementById('mi-name').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('mi-amt').focus();});
document.getElementById('mi-amt').addEventListener('keydown',function(e){if(e.key==='Enter')doAddManual();});
document.getElementById('eb-name').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('eb-amt').focus();});
document.getElementById('eb-amt').addEventListener('keydown',function(e){if(e.key==='Enter')doSaveEditBudget();});
document.getElementById('nb-name').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('nb-amt').focus();});
document.getElementById('nb-amt').addEventListener('keydown',function(e){if(e.key==='Enter')doAddBudgetFromModal();});
loadRates();
loadData();
</script></body></html>
